name: Auto-trade (paper)

# Phase 2 execution worker. Now runs AUTOMATICALLY on a daily schedule, but stays
# safe by default: scheduled runs are DRY-RUN (log intended orders, submit
# nothing) until you set the repo variable AUTO_DRY_RUN to 'false'.
#   - Repo → Settings → Secrets and variables → Actions → Variables →
#       AUTO_DRY_RUN = false   (when you're ready for real paper orders)
# Per-user `enabled` + `mode` in each user's config still gate everything, and
# the Alpaca PAPER endpoint is forced unless a user explicitly set mode='live'.
# A manual run can always override dry_run via the input below.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Simulate only (true) / place orders (false). Blank = use the AUTO_DRY_RUN repo variable.'
        required: false
        default: ''
      only_uid:
        description: 'Restrict to a single user uid (optional)'
        required: false
        default: ''
      kill_switch:
        description: 'Global kill switch — abort without placing any orders'
        required: false
        default: 'false'
  # GitHub cron is fixed UTC (no DST) AND best-effort — scheduled runs routinely
  # land 10-40 min late. So we fire SEVERAL times across the morning; the worker
  # gates new entries to the 09:30-11:00 ET window (src/auto/engine.js inEntryWindow)
  # and is idempotent (deterministic client order id), so early/late/duplicate
  # runs are harmless — the first one inside the window that finds the previous
  # session's signals places the (limit) orders; the rest just reconcile. The
  # UTC slots below cover the ET window in both EDT (summer) and EST (winter).
  schedule:
    - cron: "35,55 13 * * 1-5"     # EDT 09:35, 09:55 ET
    - cron: "15,35,55 14 * * 1-5"  # EDT 10:15/10:35/10:55 · EST 09:15/09:35/09:55 ET
    - cron: "15 15 * * 1-5"        # EST 10:15 ET
    - cron: "45 19 * * 1-5"        # ~15:45 ET (both regimes) — reconcile fills/exits

jobs:
  auto-trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Run auto-trade worker
        env:
          FIREBASE_PROJECT_ID:           ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          # Manual input wins; otherwise scheduled runs read the AUTO_DRY_RUN repo
          # variable (defaults to dry-run when unset). Set AUTO_DRY_RUN=false to go live.
          DRY_RUN:     ${{ github.event.inputs.dry_run || vars.AUTO_DRY_RUN || 'true' }}
          ONLY_UID:    ${{ github.event.inputs.only_uid || '' }}
          KILL_SWITCH: ${{ github.event.inputs.kill_switch || 'false' }}
          # Hard gate for REAL MONEY: live broker URLs are blocked unless this is 'true'.
          ALLOW_LIVE:  ${{ vars.ALLOW_LIVE || 'false' }}
        run: node scripts/auto-trade.mjs
