name: Auto-trade (paper)

# Phase 2 execution worker. Now runs AUTOMATICALLY on a daily schedule, but stays
# safe by default: scheduled runs are DRY-RUN (log intended orders, submit
# nothing) until you set the repo variable AUTO_DRY_RUN to 'false'.
#   - Repo → Settings → Secrets and variables → Actions → Variables →
#       AUTO_DRY_RUN = false   (when you're ready for real paper orders)
# Per-user `enabled` + `mode` in each user's config still gate everything, and
# the Alpaca PAPER endpoint is forced unless a user explicitly set mode='live'.
# A manual run can always override dry_run via the input below.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Simulate only (true) / place orders (false). Blank = use the AUTO_DRY_RUN repo variable.'
        required: false
        default: ''
      only_uid:
        description: 'Restrict to a single user uid (optional)'
        required: false
        default: ''
      kill_switch:
        description: 'Global kill switch — abort without placing any orders'
        required: false
        default: 'false'
  # GitHub cron is fixed UTC (no DST) AND best-effort — on this repo scheduled
  # runs have been observed starting 2-3 HOURS late (e.g. the old 13:35 UTC slot
  # ran at ~16:00 UTC / 12:00 ET). So the slots below start well BEFORE the
  # market open and repeat every 30 min: whatever the delay, several runs land
  # inside the entry window. The worker gates new entries to the 09:30-13:00 ET
  # window (src/auto/engine.js inEntryWindow) and is idempotent (deterministic
  # client order id), so early/late/duplicate runs are harmless — runs before
  # the open or after the window just reconcile; the first one inside the
  # window places the (limit) orders. Covers both EDT (summer) and EST (winter).
  schedule:
    - cron: "20,50 11 * * 1-5"   # land ~09:30-10:50 ET (EDT) with the typical 2-3h delay
    - cron: "20,50 12 * * 1-5"
    - cron: "20,50 13 * * 1-5"   # 09:20/09:50 EDT if GitHub ever runs on time
    - cron: "20,50 14 * * 1-5"   # 10:20/10:50 EDT · 09:20/09:50 EST on time
    - cron: "20 15 * * 1-5"      # 11:20 EDT · 10:20 EST on time
    - cron: "45 18 * * 1-5"      # reconcile fills/exits — lands ~15:45-16:15 ET with the usual ~1h delay

jobs:
  auto-trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Run auto-trade worker
        env:
          FIREBASE_PROJECT_ID:           ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          # Manual input wins; otherwise scheduled runs read the AUTO_DRY_RUN repo
          # variable (defaults to dry-run when unset). Set AUTO_DRY_RUN=false to go live.
          DRY_RUN:     ${{ github.event.inputs.dry_run || vars.AUTO_DRY_RUN || 'true' }}
          ONLY_UID:    ${{ github.event.inputs.only_uid || '' }}
          KILL_SWITCH: ${{ github.event.inputs.kill_switch || 'false' }}
          # Hard gate for REAL MONEY: live broker URLs are blocked unless this is 'true'.
          ALLOW_LIVE:  ${{ vars.ALLOW_LIVE || 'false' }}
        run: node scripts/auto-trade.mjs
