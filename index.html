<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e14" />
  <meta name="description" content="Swing Terminal — multi-strategy swing-trading console with daily signals and per-user trade tracking." />
  <title>Swing Terminal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />

  <!-- Apply stored font-size + theme BEFORE the bundle loads, so the page renders
       at the user's chosen scale immediately and never flashes the default. -->
  <script>
    (function () {
      try {
        var fs = localStorage.getItem('swing.fs');
        var th = localStorage.getItem('swing.theme');
        document.documentElement.setAttribute('data-fs',    (fs === 'S' || fs === 'L' || fs === 'M') ? fs : 'M');
        document.documentElement.setAttribute('data-theme', th === 'light' ? 'light' : 'dark');
      } catch (e) {
        document.documentElement.setAttribute('data-fs', 'M');
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
